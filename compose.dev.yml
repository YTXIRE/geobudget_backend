services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geobudget}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-geouser}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-geopass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - geobudget_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-geouser} -d ${POSTGRES_DB:-geobudget}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  geobudget_pgdata_dev:
