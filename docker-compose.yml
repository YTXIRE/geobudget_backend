services:
  postgres:
    image: postgres:16
    container_name: geobudget-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geobudget}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-geouser}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-geopass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - geobudget_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-geouser} -d ${POSTGRES_DB:-geobudget}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    container_name: geobudget-backend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JWT_SECRET: ${JWT_SECRET:-}
        DADATA_API_KEY: ${DADATA_API_KEY:-}
        DADATA_X_SECRET: ${DADATA_X_SECRET:-}
        PROVERKACHECKA_API_KEY: ${PROVERKACHECKA_API_KEY:-}
    image: geobudget-backend:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-geobudget}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-geouser}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-geopass}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      SPRING_APPLICATION_URL: ${SPRING_APPLICATION_URL:-http://localhost:8180}
    ports:
      - "${APP_PORT:-8180}:8180"

volumes:
  geobudget_pgdata:
